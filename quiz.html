<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hOCG DB — Minigames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-main: #41C3E3; 
            --brand-hover: #00A6D6; 
            --holo-teal: #1D9E75; 
            --holo-orange: #EF9F27;
            --danger: #FF5252;
            --navy: #0B111A;
            --navy-2: #15202B;
            --navy-3: #1A2636;
            --text-bright: #F8FAFC;
            --text-mid: #94A3B8;
            --text-dim: #475569;
            --border-dim: rgba(65, 195, 227, 0.15);
        }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--navy); color: var(--text-bright); font-family: 'nunito', sans-serif; }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(11, 17, 26, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dim);
            display: flex; align-items: center; justify-content: space-between; padding: 12px 20px;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: 0.1em; color: var(--text-bright); text-decoration: none;}
        .logo span { color: var(--brand-main); }
        .tabs { display: flex; gap: 6px; }
        .tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 6px 14px; border-radius: 8px; border: 1px solid transparent;
            text-decoration: none; color: var(--text-mid); transition: all 0.2s ease;
        }
        .tab-title { font-family: 'nunito', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text-bright); }
        .tab.active { background: rgba(65, 195, 227, 0.15); border-color: rgba(65, 195, 227, 0.3); color: var(--brand-main); }

        /* ── QUIZ STYLES ── */
        .panel { 
            background-color: var(--navy-3); border: 1px solid var(--border-dim); 
            border-radius: 12px; padding: 2rem; box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            margin-top: 2rem;
        }
        .btn-export { 
            background: var(--navy-4); color: var(--text-bright); border: 1px solid var(--border-dim); 
            border-radius: 8px; font-weight: 800; padding: 0.8rem 1.5rem; cursor: pointer; 
            transition: all 0.2s ease; font-family: inherit; font-size: 1rem; text-transform: uppercase; 
        }
        .btn-export:hover { background: var(--brand-hover); border-color: var(--brand-hover); color: #ffffff;}
        
        .quiz-image { max-width: 200px; border-radius: 8px; transition: filter 0.5s ease; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        /* We use a heavy blur and boost the colors slightly to make it a fun color-palette guessing game */
        .silhouette-mode { 
            filter: blur(12px) saturate(1.5) brightness(0.8); 
            transform: scale(1.02); /* hides the fuzzy blurred edges */
        }
        .revealed-mode { filter: brightness(1); }

        .btn-choice {
            background: var(--navy-2); color: var(--text-bright); border: 1px solid var(--border-dim);
            padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-choice:hover { background: var(--brand-main); color: var(--navy); }
        .btn-choice.correct { background: var(--holo-teal); border-color: var(--holo-teal); color: #fff; }
        .btn-choice.wrong { background: var(--danger); border-color: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <header class="topbar">
        <a href="index.html" class="logo">Hololive OCG <span>DB</span></a>
        <nav class="tabs">
            <a href="index.html" class="tab"><span class="tab-title">Modern Library</span></a>
            <a href="card-library.html" class="tab"><span class="tab-title">Simple Library</span></a>
            <a href="quiz.html" class="tab active"><span class="tab-title">Minigames</span></a>
        </nav>
        <div style="width: 150px;"></div> </header>

    <div class="panel" id="quiz-panel" style="max-width: 700px; margin: 2rem auto; text-align: center;">
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 1.5rem;">
            <button class="btn-export" onclick="startQuiz('visual')">Guess the Art</button>
            <button class="btn-export" onclick="startQuiz('text')">Whose Skill?</button>
        </div>
        
        <div style="margin-bottom: 1rem; color: var(--text-mid); font-weight: 800;">
            Streak: <span id="quiz-score" style="color: var(--brand-main); font-size: 1.2rem;">0</span>
        </div>

        <div id="quiz-display" style="position: relative; min-height: 300px; display: flex; align-items: center; justify-content: center; background: var(--navy-2); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border-dim); margin-bottom: 1rem;">
            <h3 style="color: var(--text-dim);" id="loading-msg">Loading database... Please wait.</h3>
        </div>

        <div id="quiz-choices" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            </div>
    </div>

<script>
    // 1. DATABASE LOADER (Copied from your library)
    const csvFilesToLoad = [
        'hBP01.csv', 'hBP02.csv', 'hBP03.csv', 'hBP04.csv',
        'hBP05.csv', 'hBP06.csv', 'hBP07.csv', 'hBP08.csv', 'hSD.csv'
    ];
    let masterCardPool = [];

    function parseCSV(text) {
        let result = []; let row = []; let inQuotes = false; let val = '';
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (inQuotes) {
                if (char === '"') {
                    if (i + 1 < text.length && text[i + 1] === '"') { val += '"'; i++; } 
                    else { inQuotes = false; }
                } else { val += char; }
            } else {
                if (char === '"') { inQuotes = true; } 
                else if (char === ',') { row.push(val.trim()); val = ''; } 
                else if (char === '\n' || char === '\r') {
                    row.push(val.trim()); result.push(row); row = []; val = '';
                    if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') i++; 
                } else { val += char; }
            }
        }
        if (val !== '' || row.length > 0) { row.push(val.trim()); result.push(row); }
        return result;
    }

    async function initializeDatabase() {
        let combinedDatabase = [];
        for (const fileName of csvFilesToLoad) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) continue;
                const text = await response.text();
                const rows = parseCSV(text);
                if (rows.length < 2) continue;

                const headers = rows[0].map(h => h.replace(/"/g, '').trim().toLowerCase());
                let textIdx = 8; 
                for (let i = 0; i < headers.length; i++) {
                    if (headers[i].includes("text")) textIdx = i;
                }
                
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i];
                    if (cols.length < 3) continue; 
                    const setCode = cols[0]; const nameRaw = cols[1];
                    if (!setCode || !nameRaw || setCode.toLowerCase().includes("setcode")) continue; 
                    
                    let cardName = nameRaw;
                    const match = nameRaw.match(/\((.*?)\)/);
                    if (match) cardName = match[1].trim();
                    
                    let rawSkills = cols[textIdx] || "None";
                    
                    combinedDatabase.push({
                        card_name: cardName, card_id: setCode.trim(), skills_text: rawSkills
                    });
                }
            } catch (error) {}
        }
        masterCardPool = combinedDatabase;
        document.getElementById("loading-msg").innerText = "Database loaded! Select a game mode above to start.";
    }

    // 2. QUIZ LOGIC
    let currentQuizMode = 'visual';
    let correctCard = null;
    let currentStreak = 0;

    function getRandomCards(count, requireSkill = false) {
        let pool = masterCardPool.filter(c => c.card_name && c.card_id);
        if (requireSkill) {
            pool = pool.filter(c => c.skills_text && c.skills_text.length > 15 && c.skills_text !== "None");
        }
        let shuffled = pool.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
    }

    function startQuiz(mode) {
        if (masterCardPool.length === 0) {
            alert("Database is still loading. Please wait a moment!");
            return;
        }

        currentQuizMode = mode;
        document.getElementById("quiz-choices").innerHTML = "";
        
        const choices = getRandomCards(4, mode === 'text');
        correctCard = choices[0];
        const shuffledChoices = [...choices].sort(() => 0.5 - Math.random());
        const displayArea = document.getElementById("quiz-display");

        if (mode === 'visual') {
            const setPrefix = correctCard.card_id.split('-')[0];
            const imagePath = `images/${setPrefix}/${correctCard.card_id}.jpg`;
            displayArea.innerHTML = `<img id="quiz-art" src="${imagePath}" class="quiz-image silhouette-mode" onerror="this.src=''; this.alt='Image not found'; this.classList.remove('silhouette-mode');" />`;
        } else {
            let hiddenText = correctCard.skills_text.replace(new RegExp(correctCard.card_name, 'gi'), "<b>[???]</b>");
            displayArea.innerHTML = `
                <div style="text-align: left; background: #fff; color: #000; padding: 1.5rem; border-radius: 8px; border-left: 5px solid var(--holo-orange); font-weight: 600; line-height: 1.5; width: 100%;">
                    <div style="font-size: 0.8rem; color: var(--holo-orange); text-transform: uppercase; margin-bottom: 8px;">Whose skill is this?</div>
                    ${hiddenText.replace(/\\n/g, '<br>').replace(/\n/g, '<br>')}
                </div>
            `;
        }

        const choicesContainer = document.getElementById("quiz-choices");
        shuffledChoices.forEach(card => {
            const btn = document.createElement("button");
            btn.className = "btn-choice";
            btn.innerText = card.card_name;
            btn.onclick = () => checkAnswer(btn, card.card_id);
            choicesContainer.appendChild(btn);
        });
    }

    function checkAnswer(clickedButton, guessedCardId) {
        const allButtons = document.querySelectorAll(".btn-choice");
        allButtons.forEach(btn => btn.style.pointerEvents = "none");

        if (guessedCardId === correctCard.card_id) {
            clickedButton.classList.add("correct");
            currentStreak++;
            document.getElementById("quiz-score").innerText = currentStreak;
            
            const art = document.getElementById("quiz-art");
            if (art) {
                art.classList.remove("silhouette-mode");
                art.classList.add("revealed-mode");
            }
            setTimeout(() => startQuiz(currentQuizMode), 1500);

        } else {
            clickedButton.classList.add("wrong");
            currentStreak = 0;
            document.getElementById("quiz-score").innerText = currentStreak;

            allButtons.forEach(btn => {
                if (btn.innerText.includes(correctCard.card_name)) {
                    btn.classList.add("correct");
                }
            });

            const art = document.getElementById("quiz-art");
            if (art) {
                art.classList.remove("silhouette-mode");
                art.classList.add("revealed-mode");
            }

            document.getElementById("quiz-display").innerHTML += `
                <div style="position: absolute; background: rgba(0,0,0,0.85); padding: 20px 40px; border-radius: 12px; backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; gap: 15px;">
                    <h2 style="color: var(--danger); margin: 0;">Incorrect!</h2>
                    <p style="color: #fff; margin: 0; font-weight: bold;">It was ${correctCard.card_name}</p>
                    <button class="btn-export" onclick="startQuiz('${currentQuizMode}')">Next Question</button>
                </div>
            `;
        }
    }

    // Start loading the database as soon as the page opens
    initializeDatabase();
</script>
</body>
</html>
